openapi: "3.0.3"
info:
  title: E-commerce API
  version: "1.2.0"
  description: Product catalog, cart, checkout, and order management
servers:
  - url: https://api.shop.example.com/v2
    description: Production

paths:
  /products:
    get:
      operationId: listProducts
      summary: Search and filter products
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: min_price
          in: query
          required: false
          schema:
            type: number
            minimum: 0
        - name: max_price
          in: query
          required: false
          schema:
            type: number
            minimum: 0
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [price_asc, price_desc, name_asc, name_desc, newest]
            default: newest
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /products/{productId}:
    get:
      operationId: getProduct
      summary: Get a single product with full details
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"

  /cart:
    get:
      operationId: getCart
      summary: Get current user's cart
      responses:
        "200":
          description: Cart contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

    post:
      operationId: addToCart
      summary: Add an item to the cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
                - quantity
              properties:
                productId:
                  type: string
                  format: uuid
                quantity:
                  type: integer
                  minimum: 1
                  maximum: 99
      responses:
        "200":
          description: Cart updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "422":
          description: Validation error

  /cart/items/{itemId}:
    patch:
      operationId: updateCartItem
      summary: Update item quantity
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - quantity
              properties:
                quantity:
                  type: integer
                  minimum: 0
                  maximum: 99
      responses:
        "200":
          description: Cart updated

    delete:
      operationId: removeCartItem
      summary: Remove item from cart
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Item removed

  /checkout:
    post:
      operationId: checkout
      summary: Place an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "422":
          description: Validation error

  /orders:
    get:
      operationId: listOrders
      summary: List user's orders
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, confirmed, shipped, delivered, cancelled]
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrderSummary"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /orders/{orderId}:
    get:
      operationId: getOrder
      summary: Get order details
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Full order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        price:
          type: number
          format: float
        currency:
          type: string
          minLength: 3
          maxLength: 3
        category:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            slug:
              type: string
        tags:
          type: array
          items:
            type: string
        image_url:
          type: string
          format: uri
          nullable: true
        rating:
          type: number
          format: float
          minimum: 0
          maximum: 5
          nullable: true

    ProductDetail:
      allOf:
        - $ref: "#/components/schemas/Product"
        - type: object
          properties:
            description:
              type: string
            specifications:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  value:
                    type: string
            variants:
              type: array
              items:
                $ref: "#/components/schemas/ProductVariant"
            related_products:
              type: array
              items:
                type: string
                format: uuid

    ProductVariant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        price:
          type: number
          format: float
        in_stock:
          type: boolean

    Cart:
      type: object
      properties:
        id:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotal:
          type: number
          format: float
        item_count:
          type: integer

    CartItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        product:
          $ref: "#/components/schemas/Product"
        quantity:
          type: integer
        unit_price:
          type: number
          format: float
        total:
          type: number
          format: float

    CheckoutRequest:
      type: object
      required:
        - shipping_address
      properties:
        shipping_address:
          $ref: "#/components/schemas/Address"
        billing_address:
          $ref: "#/components/schemas/Address"
        coupon_code:
          type: string
          nullable: true
        notes:
          type: string
          maxLength: 500
          nullable: true

    Address:
      type: object
      required:
        - line1
        - city
        - country
        - postal_code
      properties:
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
          nullable: true
        country:
          type: string
          minLength: 2
          maxLength: 2
        postal_code:
          type: string

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        items:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: string
                format: uuid
              quantity:
                type: integer
              unit_price:
                type: number
                format: float
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
        total:
          type: number
          format: float
        shipping_address:
          $ref: "#/components/schemas/Address"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OrderSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        total:
          type: number
          format: float
        item_count:
          type: integer
        created_at:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
